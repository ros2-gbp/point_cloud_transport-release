## rosdoc2 configuration for point_cloud_transport.

type: 'rosdoc2 config'
version: 1

---

settings:
  always_run_doxygen: true

builders:
    - doxygen: {
        name: 'point_cloud_transport Public C/C++ API',
        output_dir: 'generated/doxygen',
        extra_doxyfile_statements: [
            'PREDEFINED = DOXYGEN_SHOULD_SKIP_THIS POINT_CLOUD_TRANSPORT_PUBLIC= POINT_CLOUD_TRANSPORT_LOCAL= POINT_CLOUD_TRANSPORT_EXPORT= POINT_CLOUD_TRANSPORT_IMPORT=',
            'EXTRACT_ALL = YES',
            'EXTRACT_PRIVATE = NO',
            'EXTRACT_STATIC = YES',
            'ENABLE_PREPROCESSING = YES',
            'QUIET = YES'
        ]
    }
    - sphinx: {
        name: 'point_cloud_transport',
        sphinx_sourcedir: doc,
        doxygen_xml_directory: 'generated/doxygen/xml',
        output_dir: ''
    }
